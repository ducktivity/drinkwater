name: Web Check

# Reusable workflow for SolidJS web app validation: typecheck, lint, build.
# Called by:
#   - CI workflows (ci-web.yml) on every PR/main push
#   - CD workflows (cd-web.yml, cd-desktop.yml) before deploying/releasing

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: TypeScript & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
