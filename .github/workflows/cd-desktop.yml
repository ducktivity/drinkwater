name: Desktop Release

# Builds the Tauri Windows desktop app and publishes a GitHub Release with the
# installer + signed update artifacts attached. This is the distribution track:
# the published Release is what the public downloads from, and the auto-updater
# (tauri-plugin-updater) reads `latest.json` from the latest Release to push
# smooth in-app updates to installed copies.
#
# Trigger: pushing a version tag like `v1.2.3`. Bump the version first with
# `pnpm run release <version>` (see docs/release-desktop.md), commit, then push
# the tag.

on:
  push:
    tags:
      - 'v*'
  # Also callable from cd-tag.yml so a merged version bump can publish the
  # desktop release without a manually pushed tag (and without a PAT/deploy key).
  # When called, `tag` is the version tag to publish; tauri-action creates that
  # tag at the current commit as part of creating the GitHub Release.
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to create and publish, e.g. v1.2.3'
        required: true
        type: string

# tauri-action needs write access to create the Release and upload assets.
permissions:
  contents: write

jobs:

  desktop-check:
    name: Verify Tauri before release
    uses: ./.github/workflows/_desktop-check.yml

  release:
    name: Build & publish Windows installer
    needs: [desktop-check]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so git-cliff can build the changelog range
          # (commits since the previous release).
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + the Rust build dir so repeat releases don't
      # recompile every dependency from scratch.
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web-desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: web-desktop
        run: pnpm install --frozen-lockfile

      # Render the release notes from Conventional Commits since the last
      # release. When invoked from cd-tag.yml the tag doesn't exist yet, so we
      # render the unreleased commits labelled with `inputs.tag`; on a manual
      # tag-push the tag is already at HEAD, so we render the latest section.
      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ inputs.tag && format('--unreleased --tag {0}', inputs.tag) || '--latest' }}

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          # Provided automatically by Actions; lets tauri-action create the
          # GitHub Release and upload the installer + latest.json.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key (generated with `pnpm tauri signer generate`).
          # The public half lives in tauri.conf.json; these two are repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Backend URL baked into the bundle (same repo variable the web build
          # uses). Falls back to the localhost default if unset.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        with:
          # Run Tauri from the frontend project root.
          projectPath: web-desktop
          # Name the Release after the tag: the pushed tag on a tag-push, or the
          # `tag` input when invoked from cd-tag.yml. __VERSION__ is substituted
          # by tauri-action from tauri.conf.json.
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'Drinkwater __VERSION__'
          # Changelog generated above (cliff.toml appends the download/install
          # footer). Falls back to a static line if git-cliff produced nothing.
          releaseBody: ${{ steps.changelog.outputs.content || 'See the assets below to download and install. Installed copies update themselves automatically.' }}
          # Publish immediately (not a draft) so the auto-updater can read
          # latest.json from the "latest release" URL right away.
          releaseDraft: false
          prerelease: false
