name: Frontend Deploy

# Builds the SolidJS web app and (on main) deploys the static bundle to
# Cloudflare Pages via Wrangler. Pull requests build only — they validate the
# bundle compiles but never deploy. This is the lean "get it live" frontend
# track from docs/deployment-web.md; the full docs/architecture.md §7 promotion
# gate (deploy AFTER the backend is verified live) layers on later.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & deploy web to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          # Public URL baked into the bundle. Held as a repo variable (not a
          # secret) so the domain isn't hardcoded in the repo; falls back to the
          # localhost default if unset.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Deploy only for real pushes to main, never for pull requests.
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web-desktop
          command: pages deploy dist --project-name=drinkwater-web --branch=main
