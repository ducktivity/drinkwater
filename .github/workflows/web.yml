name: Frontend Deploy

# Builds the SolidJS web app and deploys the static bundle to Cloudflare Pages
# via Wrangler.
#
# Ordering (docs/architecture.md §7: the frontend deploys AFTER the backend):
#   - Pull requests build only — they validate the bundle compiles, never deploy.
#   - On main, the deploy is triggered by `workflow_run` AFTER "Backend CI"
#     finishes, and runs only if that run succeeded. So a push to main builds the
#     verified backend image first, and only then does the web bundle deploy — a
#     stale cached SPA never meets an API image that failed to build.

on:
  pull_request:
    branches: [main]
  # Fires after Backend CI completes on main; the deploy is gated on its success
  # below. `branches: [main]` scopes this to Backend CI's main runs (a PR's
  # Backend CI run has the PR's source branch as its head, so it won't match).
  workflow_run:
    workflows: ['Backend CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & deploy web to Cloudflare Pages
    runs-on: ubuntu-latest
    # PRs always build (validation). Post-Backend-CI runs proceed only when that
    # run both succeeded and was itself a push (not a PR-triggered backend run).
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    defaults:
      run:
        working-directory: web-desktop
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_run, build the exact commit Backend CI verified rather
          # than whatever main points at now. On PRs, github.event.workflow_run
          # is empty, so this falls back to the default PR ref.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          # Public URL baked into the bundle. Held as a repo variable (not a
          # secret) so the domain isn't hardcoded in the repo; falls back to the
          # localhost default if unset.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Deploy only on the post-Backend-CI run (main), never on pull requests.
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'workflow_run'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web-desktop
          command: pages deploy dist --project-name=drinkwater-web --branch=main
