name: Backend CD

# Builds, checks, and (on main) publishes the backend image to GHCR.
# This is the minimal "get it live" pipeline from docs/deployment.md Step 8 — it
# does NOT yet include the full docs/architecture.md §7 machinery (generated-
# artifact drift checks, ephemeral-Postgres migration tests, the :production
# promotion gate, or the frontend build). Those layer on later.

on:
  push:
    branches: [main]

# Least privilege by default; the image job widens to packages: write.
permissions:
  contents: read

jobs:
  # Detect whether anything affecting the backend image changed in this push.
  # We deliberately do NOT use a top-level `on.push.paths` filter: that would
  # stop Backend CD from running at all on a web-only push, and both Web Deploy
  # and Desktop Release hang off this workflow's completion (workflow_run). So
  # the workflow always starts; we just skip the expensive jobs below when the
  # backend is untouched. On a push, paths-filter diffs against the prior commit.
  changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend: 'backend/**'

  # Verification gate, extracted into a reusable workflow so the exact same gates
  # also guard the tagged Desktop Release (see _backend-check.yml). The image is
  # published only after this passes. Skipped (run stays green) when the backend
  # did not change.
  check:
    name: Verify backend before image release
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/_backend-check.yml

  image:
    name: Build & push image to GHCR
    needs: [changes, check]
    # Publish only when the backend actually changed and the gate passed. When
    # the backend is unchanged, `latest` already points at the correct image, so
    # there is nothing to release.
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute build timestamp
        id: bm
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided; no PAT needed

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name = ghcr.io/<repo owner>/drinkwater-backend (auto-lowercased).
          images: ghcr.io/${{ github.repository_owner }}/drinkwater-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          # immutable per-commit tag, e.g. sha-1a2b3c4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Feed git metadata into the Dockerfile ARGs -> ldflags, so the running
          # binary (and its logs/Sentry release) report the exact commit.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.bm.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
