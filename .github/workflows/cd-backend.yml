name: Backend CD

# Builds, checks, and (on main) publishes the backend image to GHCR.
# This is the minimal "get it live" pipeline from docs/deployment.md Step 8 — it
# does NOT yet include the full docs/architecture.md §7 machinery (generated-
# artifact drift checks, ephemeral-Postgres migration tests, the :production
# promotion gate, or the frontend build). Those layer on later.

on:
  push:
    branches: [main]

# Least privilege by default; the image job widens to packages: write.
permissions:
  contents: read

jobs:
  # Verification gate, extracted into a reusable workflow so the exact same gates
  # also guard the tagged Desktop Release (see _backend-check.yml). The image is
  # published only after this passes.
  check:
    name: Verify backend before image release
    uses: ./.github/workflows/_backend-check.yml

  image:
    name: Build & push image to GHCR
    needs: check
    # Publish only for real pushes to main, never for pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute build timestamp
        id: bm
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided; no PAT needed

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name = ghcr.io/<repo owner>/drinkwater-backend (auto-lowercased).
          images: ghcr.io/${{ github.repository_owner }}/drinkwater-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          # immutable per-commit tag, e.g. sha-1a2b3c4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Feed git metadata into the Dockerfile ARGs -> ldflags, so the running
          # binary (and its logs/Sentry release) report the exact commit.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.bm.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
