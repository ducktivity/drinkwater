name: Backend Check

# Reusable backend verification gate: format, vet, build, test, staticcheck, gosec — the same gates scripts/check.sh runs locally. It is the single source of truth for "the backend is verified at this commit", called by:
#   - Backend CD (cd-backend.yml) on every push/PR to main, and
#   - Desktop Release (cd-desktop.yml) before publishing a tagged installer,
# so a frontend artifact only ships after a verified backend (architecture.md §7: deploy the frontend after the backend, never before).

on:
  workflow_call:

# Least privilege; this gate only reads the repo.
permissions:
  contents: read

jobs:
  check:
    name: Format, vet, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin Go to whatever go.mod declares, so CI matches local builds.
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: gofmt (check only, never mutate)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      # staticcheck via its official action (by Staticcheck's own author). It supports working-directory, so it cleanly targets our backend submodule. install-go: false reuses the Go set up above instead of installing twice.
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
          working-directory: backend

      # gosec is pinned in go.mod (go tool), matching scripts/check.sh. We do not use securego/gosec's official action: it is a Docker container action with only an `args` input and always runs at the repo root, so it cannot target a Go module that lives in a subdirectory (our module is backend/).
      - name: gosec
        run: go tool gosec -quiet ./...

      # Generated-artifact drift check (architecture.md §7). The OpenAPI spec (shared-schemas/swagger.json) and the sqlc Go code (database/dbgen) are the committed output of generators driven off the DB schema/queries — the SSOT pipeline. Re-run those generators and assert the working tree is unchanged: a non-empty diff means someone edited the schema or queries without regenerating, so the committed artifacts have drifted. This is a check only — it fails the job rather than committing the regenerated files. swag and sqlc are the same go-tool versions scripts/check.sh uses.
      - name: Generated-artifact drift (swagger + sqlc)
        run: |
          ./scripts/export-swagger.sh
          ./scripts/db-codegen.sh
          if [ -n "$(git status --porcelain -- ../shared-schemas/swagger.json database/dbgen)" ]; then
            echo "::error::Generated artifacts are stale. Run ./scripts/export-swagger.sh and ./scripts/db-codegen.sh from backend/ and commit the result."
            git status --porcelain -- ../shared-schemas/swagger.json database/dbgen
            git diff -- ../shared-schemas/swagger.json database/dbgen
            exit 1
          fi
