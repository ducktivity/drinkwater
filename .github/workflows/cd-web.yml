name: Web Deploy

# Builds the SolidJS web app and deploys to Cloudflare Pages via Wrangler.
#
# Release-gated and fired on push to main — the SAME event that starts Backend
# CD — so web goes live alongside the backend and desktop, not chained after the
# backend. It does NOT wait for Backend CD to finish; the backend cutover is a
# separate manual box reconcile anyway (see cd-backend.yml).
#   - The `decide` job reads the version from web-desktop/package.json. If that
#     version has no git tag yet, this commit cuts a new release and we deploy;
#     if the version is already tagged, every job is skipped and the run finishes
#     green (Cloudflare keeps serving the last deployment).
#   - Bump the version with `pnpm run release <version>`, commit, and merge to
#     publish web + desktop together.
#   - PRs are validated by ci-web.yml before merge (branch protection).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Deploy only when a new release is cut. Web Deploy fires on every push to
  # main, so we gate on the version in web-desktop/package.json: deploy only when
  # that version has no tag yet, which is exactly the commit where the release is
  # cut. This matches cd-desktop.yml's `decide` job so web and desktop ship the
  # same version together.
  decide:
    name: Decide whether to deploy
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the version-tag existence check is reliable.
          fetch-depth: 0
      - name: Decide whether this commit cuts a new release
        id: d
        run: |
          version=$(node -p "require('./web-desktop/package.json').version")
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "$tag already released — skipping web deploy."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "$version is new — will deploy web for $tag."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Verify web before deploy
    needs: decide
    if: needs.decide.outputs.release == 'true'
    uses: ./.github/workflows/_web-check.yml

  deploy:
    name: Build & deploy web to Cloudflare Pages
    needs: [decide, check]
    runs-on: ubuntu-latest
    if: needs.decide.outputs.release == 'true'
    defaults:
      run:
        working-directory: web-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web-desktop
          command: pages deploy dist --project-name=drinkwater-web --branch=main
