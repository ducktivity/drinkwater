name: Web Check

# Reusable workflow for SolidJS web app validation: typecheck, lint, build. Called by:
#   - CI workflows (ci-web.yml) on every PR/main push
#   - CD workflows (cd-web.yml, cd-desktop.yml) before deploying/releasing

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: TypeScript & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generated-artifact drift check (architecture.md §7). The TS API types (src/types/schema.d.ts) and the converted OpenAPI 3 spec (shared-schemas/openapi.json) are generated from the backend's swagger.json via swagger2openapi + openapi-typescript. Re-run the generator and assert the working tree is unchanged: a non-empty diff means the committed types lag the schema. Check only — fails the job rather than committing the regenerated files. Runs before typecheck so a stale schema is surfaced as a drift failure, not a confusing type error.
      - name: Generated-artifact drift (openapi + schema.d.ts)
        run: |
          pnpm run generate-types
          if [ -n "$(git status --porcelain -- ../shared-schemas/openapi.json src/types/schema.d.ts)" ]; then
            echo "::error::Generated types are stale. Run 'pnpm run generate-types' from web-desktop/ and commit ../shared-schemas/openapi.json and src/types/schema.d.ts."
            git status --porcelain -- ../shared-schemas/openapi.json src/types/schema.d.ts
            git diff -- ../shared-schemas/openapi.json src/types/schema.d.ts
            exit 1
          fi

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
