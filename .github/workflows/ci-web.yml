name: Web CI

# Validation gate for the SolidJS web app on every PR/main push.
# Runs: typecheck, lint, build (validates the SPA compiles).
# Does NOT deploy (that's cd-web.yml, which runs on push to main).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Verify web
    uses: ./.github/workflows/_web-check.yml
