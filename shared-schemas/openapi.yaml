openapi: 3.0.3
info:
  title: Drinkwater Sync API
  version: 1.0.0
  description: Shared schemas and sync routes for the Drinkwater local-first app.

paths:
  /sync:
    post:
      summary: Sync local water logs with the server
      description: Push new local logs to the server and pull changes made on other devices.
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: The server_updated_at timestamp from the client's last successful sync.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WaterLog'
      responses:
        '200':
          description: Successfully processed sync data
          content:
            application/json:
              schema:
                type: object
                properties:
                  server_time:
                    type: string
                    format: date-time
                    description: Current server time to use for the next sync query.
                  changes:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerWaterLog'

components:
  schemas:
    WaterLog:
      type: object
      description: A single record of water consumed generated by a client.
      properties:
        id:
          type: string
          format: uuid
          description: Unique ID generated by the local device (Web/Desktop/Mobile).
        amount_ml:
          type: integer
          description: Amount of water consumed in milliliters.
        logged_at:
          type: string
          format: date-time
          description: When the user drank the water (ISO 8601).
        is_deleted:
          type: boolean
          description: Used for local-first sync. If true, the server tells other devices to delete this log.
      required:
        - id
        - amount_ml
        - logged_at
        - is_deleted

    ServerWaterLog:
      allOf:
        - $ref: '#/components/schemas/WaterLog'
        - type: object
          properties:
            server_updated_at:
              type: string
              format: date-time
          required:
            - server_updated_at
