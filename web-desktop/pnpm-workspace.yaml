# Single-package project (no workspace members); this file exists so pnpm 10.7+ reads the dependency overrides below. `packages` is intentionally empty.
packages: []

# Intentionally skip these packages' postinstall build scripts. Without an explicit decision, pnpm 10.16+/11 treats ignored builds as a hard error (ERR_PNPM_IGNORED_BUILDS) in `pnpm add`/`pnpm exec` — which broke `cloudflare/wrangler-action` (it runs `pnpm exec wrangler --version`). None are needed for our web build or `wrangler pages deploy`: esbuild's binary ships via its platform-specific package, and sharp/workerd are only used by `wrangler dev`.
allowBuilds:
  esbuild: false
  sharp: false
  workerd: false

minimumReleaseAgeExclude:
  - '@ducktivity/identity-client@0.1.0'

# Force js-yaml off the vulnerable 4.1.1 that @redocly/openapi-core pins transitively. ^4.2.0 resolves to the patched 4.x latest, API-compatible.
overrides:
  js-yaml@4.1.1: ^4.2.0
