# git-cliff configuration.
#
# Renders the GitHub Release body for desktop releases from Conventional Commit
# messages. Consumed by .github/workflows/cd-desktop.yml (via git-cliff-action),
# which passes the rendered output to tauri-action's `releaseBody`.
#
# The GitHub Release already shows the version as its title, so this template
# intentionally omits a version heading and emits only the grouped changes
# followed by the download/install footer.

[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
footer = """
---
See the assets below to download and install. Installed copies update themselves automatically.
"""
header = ""
trim = true

[git]
# Parse Conventional Commits (feat/fix/...). We mandate them, so this drives the
# grouping below.
conventional_commits = true
# Keep non-conventional commits too (they fall through to "Other").
filter_unconventional = false
# Group by type, in this display order. Noise types (and the "chore: release"
# bump commit) are skipped so the notes read like a user-facing changelog.
commit_parsers = [
  {message = "^feat", group = "Features"},
  {message = "^fix", group = "Bug Fixes"},
  {message = "^perf", group = "Performance"},
  {message = "^refactor", skip = true},
  {message = "^docs", skip = true},
  {message = "^chore", skip = true},
  {message = "^ci", skip = true},
  {message = "^build", skip = true},
  {message = "^style", skip = true},
  {message = "^test", skip = true},
  {message = ".*", group = "Other"},
]
filter_commits = false
# Only real version tags delimit releases.
sort_commits = "oldest"
tag_pattern = "v[0-9]*"
