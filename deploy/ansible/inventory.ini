[prod]
drinkwater ansible_host=ducktivity-ssh.ducktvt.com ansible_user=deploy

[prod:vars]
# SSH rides Cloudflare Access, no open port on the box.
ansible_ssh_common_args='-o ProxyCommand="cloudflared access ssh --hostname %h"'

# Keep the deploy key in the Linux home (~/.ssh).
ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Pin the remote interpreter to the distro default so Ansible skips discovery
# (no "discovered Python interpreter" warning) and a future Python install
# can't silently change which interpreter modules run under.
ansible_python_interpreter=/usr/bin/python3
