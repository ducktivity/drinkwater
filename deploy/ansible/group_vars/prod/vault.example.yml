# Template for the ENCRYPTED secrets file. This .example is committed in clear
# text as documentation of the required keys; it contains NO real secrets.
#
# Create the real, encrypted file alongside it:
#   echo 'your-vault-password' > ~/.vault_pass && chmod 600 ~/.vault_pass
#   cd deploy/ansible && ansible-vault create group_vars/prod/vault.yml
#
# Paste the keys below, save, and commit vault.yml — once encrypted it is safe to commit.
# Verify with: head -1 group_vars/prod/vault.yml  ->  $ANSIBLE_VAULT;1.1;AES256

