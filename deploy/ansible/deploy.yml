---
- name: Deploy drinkwater backend
  hosts: prod
  gather_facts: false

  tasks:
    - name: Sync the repo checkout (compose file, vector config)
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        # We only need git-tracked config on the box; don't clobber untracked .env.
        force: true

    - name: Render the production .env from vars + vault
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      register: env_file

    - name: Apply expand-only migrations (one-shot goose container)
      # The app image is distroless (a single static binary, no goose), so run the
      # goose version pinned in backend/go.mod from a throwaway golang container.
      # It mounts the box's backend checkout read-only (go.mod + go.sum + sql/schema)
      # and invokes `go tool goose`. Migrations are expand-only (architecture.md §7
      # Release Harmony), so applying them BEFORE the image swap below is safe for the
      # still-running backend. The DB string is passed via GOOSE_DBSTRING (container
      # env) rather than on argv so it never lands in the box's process list. A named
      # volume caches Go's module + build artifacts so repeat deploys don't re-fetch
      # and recompile goose every time.
      ansible.builtin.command:
        cmd: >
          docker run --rm
          -v {{ app_dir }}/backend:/src:ro
          -v drinkwater_go_cache:/go
          -w /src
          -e GOCACHE=/go/.cache
          -e GOOSE_DRIVER=postgres
          -e GOOSE_DBSTRING={{ vault_database_url }}
          {{ go_image }}
          go tool goose -dir sql/schema up
        chdir: "{{ app_dir }}"
      register: migrate
      changed_when: "'OK' in migrate.stdout or 'OK' in migrate.stderr"

    - name: Pull the published images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"
      register: pull
      changed_when: "'Downloaded newer image' in pull.stderr or 'Pull complete' in pull.stdout"

    - name: Bring the stack up (recreates only changed containers)
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_dir }}"
      register: up
      changed_when: "'Recreate' in up.stderr or 'Started' in up.stderr or 'Created' in up.stderr"

    - name: Prune dangling images (reclaim disk)
      ansible.builtin.command:
        cmd: docker image prune -f
      changed_when: false

    - name: Wait for the app to report ready (DB reachable)
      # Probe the loopback-published port from the box itself (uri runs via the
      # remote Python). The app image is minimal and ships no wget/curl, so we
      # can't exec a HTTP client inside the container.
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/readyz
        status_code: 200
      register: ready
      retries: 10
      delay: 3
      until: ready.status == 200
      changed_when: false
