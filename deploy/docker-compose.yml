# Minimal starter stack for local/early deployment.
#
# The full topology in docs/architecture.md §6/§7 (cloudflared outbound tunnel + app-blue/app-green colors + on-box deploy agent) layers on top of this. The single `app` service here stands in for a live color; Vector selects app containers by label, so it will pick up the blue/green pair unchanged once they exist. No Loki/Grafana/Alloy: log storage, search, and retention live in BetterStack, off-box.
# Pin the Compose project name so it never drifts with the directory this file lives in
# (container stays drinkwater-app-1 regardless of where compose runs from).
name: drinkwater
services:
  app:
    # On the box we PULL this prebuilt image (CI publishes it to GHCR). For local dev you can instead build from ../backend via the build: block below; `docker compose build` tags the result with this same name. IMAGE_TAG lets you pin a specific sha-<gitsha> (e.g. for rollback); it defaults to the moving `latest`.
    image: ghcr.io/ducktivity/drinkwater-backend:${IMAGE_TAG:-latest}
    build:
      context: ../backend
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    environment:
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      PORT: "8001"
      DATABASE_URL: ${DATABASE_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Token verification. Drinkwater verifies (does not sign) tokens minted by the central identity service, fetching its public keys from JWKS_URL. AUTH_ISSUER must match the tokens' "iss" claim. No signing secret or email key lives here.
      JWKS_URL: ${JWKS_URL:-http://localhost:8000/.well-known/jwks.json}
      AUTH_ISSUER: ${AUTH_ISSUER:-http://localhost:8000}
    # External name resolution (NeonDB, JWKS host) is made reliable box-wide via /etc/docker/daemon.json (dns: 1.1.1.1, 8.8.8.8) — see deploy/README.md "Prerequisites (the box)". That replaces the host's flaky systemd-resolved stub (127.0.0.53) for every container, so no per-service dns: override is needed here. Docker still resolves internal aliases via its embedded 127.0.0.11.
    # No host port is published: the app is reached only over the ducktivity_edge network via the drinkwater-backend alias (shared edge cloudflared routes drinkwater.ducktvt.com -> drinkwater-backend:8001), and deploy.sh probes /readyz from a throwaway curl container on that same network. §6: no public inbound. For pure local dev, add `ports: ["8001:8001"]`.
    # Attach to the suite's shared edge network so the shared cloudflared (edge stack) can route drinkwater.ducktvt.com -> drinkwater-backend:8001. Unique alias per app.
    networks:
      ducktivity_edge:
        aliases:
          - drinkwater-backend
    labels:
      # Vector's docker_logs source tails only containers carrying this label.
      collect_logs: "true"
    # Bound the local log buffer. Vector ships from these files and BetterStack owns long-term retention, so a few rotated files is all the box keeps.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # This stack runs only the app. The shared edge stack (../edge) provides ingress + Access SSH via its cloudflared connector, and its vector ships this app's logs (it tails the collect_logs label above).

networks:
  # Shared suite ingress network, created and owned by the edge stack (../edge). `docker network create ducktivity_edge` if it does not exist yet.
  ducktivity_edge:
    external: true
