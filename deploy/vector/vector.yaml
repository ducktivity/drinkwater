# Vector pipeline: tail the Drinkwater app containers' stdout (already JSON from
# slog/httplog), enrich with source metadata, and ship to BetterStack. Vector
# buffers to disk and retries, so a BetterStack blip never blocks the app or
# drops logs. The app writes only stdout; this is the single log egress point.

data_dir: /var/lib/vector

sources:
  app_logs:
    type: docker_logs
    # Collect only containers we explicitly opt in, never the whole host.
    include_labels:
      - "collect_logs=true"

transforms:
  parse:
    type: remap
    inputs: [app_logs]
    source: |
      # Docker delivers each stdout line under `.message`. Our app emits JSON, so
      # parse it back into structured fields. If a line is not JSON (e.g. a Go
      # runtime panic dump), keep it raw under `.message` rather than dropping it.
      structured, err = parse_json(.message)
      if err == null {
        . = merge(., object(structured) ?? {})
        del(.message)
      }
      # Source metadata for filtering/dashboards in BetterStack.
      .container = .container_name
      # Drop docker_logs' label enrichment: it's all Compose internals + static
      # OCI image labels (constant noise), and the one useful bit (image revision)
      # is already on every line as the app's `commit` base attribute.
      del(.label)

sinks:
  betterstack:
    type: http
    inputs: [parse]
    # BetterStack Telemetry HTTP ingest. Host + token come from the Vector env;
    # the token is the source's ingesting token (never seen by the Go app).
    uri: "${BETTERSTACK_INGEST_HOST}"
    method: post
    encoding:
      codec: json
    auth:
      strategy: bearer
      token: "${BETTERSTACK_SOURCE_TOKEN}"
    # Disk-backed buffer: ride out BetterStack outages without losing logs.
    buffer:
      type: disk
      max_size: 268435488 # 256 MiB
      when_full: block
    request:
      retry_attempts: 10
    # BetterStack's ingest endpoint has no GET healthcheck; disable Vector's.
    healthcheck:
      enabled: false
